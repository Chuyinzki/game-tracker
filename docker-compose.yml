services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: game_backlog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

  backlog-service:
    build:
      context: .
      dockerfile: backlog-service/Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - app-network

  games-service:
    build:
      context: .
      dockerfile: games-service/Dockerfile
    env_file:
      - .env
    networks:
      - app-network

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    env_file:
      - .env
    depends_on:
      - backlog-service
      - games-service
    ports:
      - "3000:3000"
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file:
      - .env
    depends_on:
      - gateway
    ports:
      - "5173:5173"
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:
