services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: game_backlog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d game_backlog"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

  backlog-service:
    build:
      context: .
      dockerfile: backlog-service/Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
      - /app/backlog-service/node_modules
    networks:
      - app-network

  games-service:
    build:
      context: .
      dockerfile: games-service/Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
      - /app/games-service/node_modules
    networks:
      - app-network

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    env_file:
      - .env
    depends_on:
      backlog-service:
        condition: service_started
      games-service:
        condition: service_started
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
      - /app/gateway/node_modules
    ports:
      - "3000:3000"
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file:
      - .env
    depends_on:
      gateway:
        condition: service_started
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
      - /app/frontend/node_modules
    ports:
      - "5173:5173"
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:
